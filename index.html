<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#kmBox {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 10px 14px;
  color: white;
  text-align: center;
  min-width: 90px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

#label {
  font-size: 10px;
  opacity: 0.7;
}

#km {
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="kmBox">
  <div id="label">KM</div>
  <div id="km">0.00</div>
</div>

<script>
let totalDistance = 0;
let lastPos = null;

function toRad(x) {
  return x * Math.PI / 180;
}

function getDistance(p1, p2) {
  const R = 6371;
  const dLat = toRad(p2.latitude - p1.latitude);
  const dLon = toRad(p2.longitude - p1.longitude);

  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(toRad(p1.latitude)) * Math.cos(toRad(p2.latitude)) *
            Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

navigator.geolocation.watchPosition(pos => {
  if (lastPos) {
    const dist = getDistance(lastPos.coords, pos.coords);
    totalDistance += dist;
    document.getElementById("km").innerText = totalDistance.toFixed(2);
  }
  lastPos = pos;
}, err => console.log(err), {
  enableHighAccuracy: true,
  maximumAge: 1000
});
</script>

</body>
</html>
