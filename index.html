<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html,body{margin:0;background:transparent;overflow:hidden;font-family:Arial}
#bar{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:18px;align-items:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  border-radius:20px;padding:6px 14px;color:#fff;font-size:14px;
  box-shadow:0 0 10px rgba(0,0,0,.4)
}
.block{display:flex;align-items:center;gap:6px}
.label{opacity:.7;font-size:11px}
.value{font-weight:bold;font-size:16px}
</style>
</head>
<body>

<div id="bar">
  <div class="block">
    <span class="label">KM</span>
    <span class="value" id="km">0.00</span>
  </div>
  <div class="block">
    <span class="label">SPEED</span>
    <span class="value" id="speed">0.0</span> km/h
  </div>
</div>

<script>
let totalKm = 0;
let last = null;

// настройки фильтра
const MIN_MOVE_METERS = 2;   // игнор мелкого дрожания GPS
const MAX_SPEED_KMH  = 50;  // отсечь бредовые скачки
const SMOOTH_ALPHA   = 0.3; // сглаживание (0..1)

let smoothSpeed = 0;

function toRad(x){return x*Math.PI/180}
function distMeters(a,b){
  const R=6371000;
  const dLat=toRad(b.latitude-a.latitude);
  const dLon=toRad(b.longitude-a.longitude);
  const A=Math.sin(dLat/2)**2 +
    Math.cos(toRad(a.latitude))*Math.cos(toRad(b.latitude))*
    Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(A),Math.sqrt(1-A));
}

navigator.geolocation.watchPosition(pos=>{
  const now = {
    lat: pos.coords.latitude,
    lon: pos.coords.longitude,
    t:   pos.timestamp
  };

  if (last){
    const meters = distMeters(
      {latitude:last.lat, longitude:last.lon},
      {latitude:now.lat,  longitude:now.lon}
    );
    const dt = (now.t - last.t)/1000; // секунды

    if (dt > 0){
      const kmh = (meters/1000) / (dt/3600); // км/ч

      // фильтры
      if (meters >= MIN_MOVE_METERS && kmh < MAX_SPEED_KMH){
        totalKm += meters/1000;

        // сглаживание скорости
        smoothSpeed = SMOOTH_ALPHA*kmh + (1-SMOOTH_ALPHA)*smoothSpeed;

        document.getElementById("km").innerText = totalKm.toFixed(2);
        document.getElementById("speed").innerText = smoothSpeed.toFixed(1);
      }
    }
  }

  last = now;

}, err=>console.log(err), {
  enableHighAccuracy:true,
  maximumAge:1000
});
</script>

</body>
</html>
