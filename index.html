<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRL Distance + Speed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #bar {
      position: fixed;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      border-radius: 18px;
      background: rgba(15,15,20,0.82);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      color: #fff;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .bolt {
      font-size: 15px;
      line-height: 1;
      color: #4fc3ff;
      text-shadow:
        0 0 4px #4fc3ff,
        0 0 10px rgba(79,195,255,0.6);
      flex: 0 0 auto;
    }

    .item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: lowercase;
      color: rgba(255,255,255,0.55);
    }

    .num {
      font-size: 25px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      color: #4fc3ff;
      text-shadow:
        0 0 4px #4fc3ff,
        0 0 10px #2196f3,
        0 0 18px rgba(33,150,243,0.35);
    }

    .unit {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }

    .divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="bar">
  <span class="bolt">⚡</span>

  <div class="item">
    <span class="label">km</span>
    <span class="num" id="distanceValue">0.000</span>
  </div>

  <div class="divider"></div>

  <div class="item">
    <span class="label">speed</span>
    <span class="num" id="speedValue">0.0</span>
    <span class="unit">km/h</span>
  </div>
</div>

<script>
  const distanceValueEl = document.getElementById('distanceValue');
  const speedValueEl = document.getElementById('speedValue');

  let totalMeters = 0;
  let lastPoint = null;
  let smoothSpeed = 0;
  let speedBuffer = [];
  let lastMoveTime = 0;

  // Настройки
  const MAX_ACCURACY_M = 45;
  const MIN_DISTANCE_M = 1.5;
  const MAX_DISTANCE_M = 100;
  const MIN_SPEED_KMH = 1.0;
  const MAX_SPEED_KMH = 45;
  const SPEED_BUFFER_SIZE = 5;
  const STOP_TIMEOUT_MS = 3500;

  function toRad(v) {
    return v * Math.PI / 180;
  }

  function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function avg(arr) {
    if (!arr.length) return 0;
    return arr.reduce((sum, v) => sum + v, 0) / arr.length;
  }

  function getSmoothFactor(speedKmh) {
    if (speedKmh < 7) return 0.45;   // ходьба
    if (speedKmh < 18) return 0.35;  // бег / медленно
    return 0.25;                     // велик
  }

  function updateUI() {
    distanceValueEl.textContent = (totalMeters / 1000).toFixed(3);
    speedValueEl.textContent = smoothSpeed.toFixed(1);
  }

  function applySpeed(rawKmh) {
    speedBuffer.push(rawKmh);
    if (speedBuffer.length > SPEED_BUFFER_SIZE) speedBuffer.shift();

    const averaged = avg(speedBuffer);
    const smoothFactor = getSmoothFactor(averaged);

    smoothSpeed = smoothSpeed + (averaged - smoothSpeed) * smoothFactor;

    if (smoothSpeed < 0.8) smoothSpeed = 0;
  }

  function decaySpeedIfStopped() {
    const now = Date.now();
    if (now - lastMoveTime > STOP_TIMEOUT_MS) {
      smoothSpeed *= 0.55;
      if (smoothSpeed < 0.8) smoothSpeed = 0;
      updateUI();
    }
  }

  function handlePosition(pos) {
    const { latitude, longitude, accuracy, speed } = pos.coords;
    const timestamp = pos.timestamp;

    if (!lastPoint) {
      lastPoint = { latitude, longitude, timestamp, accuracy };
      updateUI();
      return;
    }

    const dt = (timestamp - lastPoint.timestamp) / 1000;
    if (dt <= 0) return;

    const dist = distanceMeters(
      lastPoint.latitude,
      lastPoint.longitude,
      latitude,
      longitude
    );

    // Берём нативную скорость, если есть. Иначе считаем сами.
    const nativeSpeedKmh = (speed != null && speed >= 0) ? speed * 3.6 : null;
    const calcSpeedKmh = (dist / dt) * 3.6;
    let finalSpeedKmh = nativeSpeedKmh;

    if (finalSpeedKmh == null || finalSpeedKmh <= 0 || finalSpeedKmh > 60) {
      finalSpeedKmh = calcSpeedKmh;
    }

    // Обновляем скорость
    if (finalSpeedKmh >= MIN_SPEED_KMH && finalSpeedKmh <= MAX_SPEED_KMH) {
      applySpeed(finalSpeedKmh);
      lastMoveTime = Date.now();
    } else {
      if (smoothSpeed < 0.8) smoothSpeed = 0;
    }

    // Добавляем дистанцию только по нормальным точкам
    const accuracyOk = accuracy <= MAX_ACCURACY_M;
    const distanceOk = dist >= MIN_DISTANCE_M && dist <= MAX_DISTANCE_M;
    const movingOk = finalSpeedKmh >= MIN_SPEED_KMH && finalSpeedKmh <= MAX_SPEED_KMH;

    if (accuracyOk && distanceOk && movingOk) {
      totalMeters += dist;
    }

    lastPoint = { latitude, longitude, timestamp, accuracy };
    updateUI();
  }

  function handleError(err) {
    console.log('Geolocation error:', err);
  }

  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(handlePosition, handleError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    });

    setInterval(decaySpeedIfStopped, 1000);
  }

  updateUI();
</script>

</body>
</html>
