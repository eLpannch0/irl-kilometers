<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRL Distance + Speed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
    }

    #bar {
      position: fixed;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 12px 20px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(28,28,36,0.92) 0%, rgba(15,15,22,0.88) 100%);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.36),
        inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      white-space: nowrap;
      overflow: hidden;
    }

    #bar::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 50%, rgba(0,229,255,0.10), transparent 28%),
        radial-gradient(circle at 85% 50%, rgba(138,46,255,0.08), transparent 28%);
      opacity: 1;
    }

    .bolt-wrap {
      position: relative;
      width: 28px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      z-index: 1;
    }

    .bolt-halo {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(0,229,255,0.22) 0%, rgba(138,46,255,0.14) 45%, transparent 72%);
      filter: blur(4px);
      animation: haloPulse 1.4s ease-in-out infinite;
    }

    @keyframes haloPulse {
      0%, 100% { transform: scale(0.95); opacity: 0.55; }
      50% { transform: scale(1.18); opacity: 0.95; }
    }

    .bolt {
      width: 24px;
      height: 30px;
      display: block;
      filter:
        drop-shadow(0 0 3px rgba(255,255,255,0.22))
        drop-shadow(0 0 8px rgba(0,229,255,0.40))
        drop-shadow(0 0 16px rgba(138,46,255,0.36))
        drop-shadow(0 0 22px rgba(255,138,0,0.22));
      z-index: 1;
    }

    .bolt path.bg {
      stroke: rgba(255,255,255,0.08);
      stroke-width: 3.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bolt path.main {
      stroke: url(#boltGradient);
      stroke-width: 3.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 150;
      stroke-dashoffset: 150;
      animation:
        boltFlow 0.95s linear infinite,
        boltGlow 1.1s ease-in-out infinite;
    }

    @keyframes boltFlow {
      0%   { stroke-dashoffset: 150; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes boltGlow {
      0%, 100% {
        filter:
          drop-shadow(0 0 2px #00e5ff)
          drop-shadow(0 0 7px #4fc3ff);
      }
      50% {
        filter:
          drop-shadow(0 0 6px #00e5ff)
          drop-shadow(0 0 14px #8a2eff)
          drop-shadow(0 0 22px #ff3cac)
          drop-shadow(0 0 30px #ff8a00);
      }
    }

    .item {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: lowercase;
      color: rgba(255,255,255,0.56);
    }

    .num {
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      color: #63cfff;
      text-shadow:
        0 0 5px #4fc3ff,
        0 0 12px #2196f3,
        0 0 24px rgba(33,150,243,0.42);
      animation: numberBreath 2.2s ease-in-out infinite;
    }

    @keyframes numberBreath {
      0%, 100% {
        text-shadow:
          0 0 5px #4fc3ff,
          0 0 12px #2196f3,
          0 0 24px rgba(33,150,243,0.34);
      }
      50% {
        text-shadow:
          0 0 7px #66d7ff,
          0 0 18px #42a5f5,
          0 0 32px rgba(66,165,245,0.50);
      }
    }

    .unit {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.74);
    }

    .divider {
      position: relative;
      z-index: 1;
      width: 1px;
      height: 32px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.18),
        rgba(255,255,255,0.06)
      );
    }
  </style>
</head>
<body>

<div id="bar">
  <span class="bolt-wrap">
    <span class="bolt-halo"></span>
    <svg class="bolt" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="boltGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%">
            <animate attributeName="stop-color"
              values="#00e5ff;#63cfff;#8a2eff;#ff3cac;#ff8a00;#00e5ff"
              dur="1.7s" repeatCount="indefinite" />
          </stop>
          <stop offset="38%">
            <animate attributeName="stop-color"
              values="#63cfff;#8a2eff;#ff3cac;#ff8a00;#00e5ff;#63cfff"
              dur="1.7s" repeatCount="indefinite" />
          </stop>
          <stop offset="72%">
            <animate attributeName="stop-color"
              values="#8a2eff;#ff3cac;#ff8a00;#00e5ff;#63cfff;#8a2eff"
              dur="1.7s" repeatCount="indefinite" />
          </stop>
          <stop offset="100%">
            <animate attributeName="stop-color"
              values="#ff8a00;#00e5ff;#63cfff;#8a2eff;#ff3cac;#ff8a00"
              dur="1.7s" repeatCount="indefinite" />
          </stop>
        </linearGradient>
      </defs>

      <path class="bg" d="M13 2 L6.5 15 H11 L8.5 28 L18 12.5 H13.5 L17 2 Z"></path>
      <path class="main" d="M13 2 L6.5 15 H11 L8.5 28 L18 12.5 H13.5 L17 2 Z"></path>
    </svg>
  </span>

  <div class="item">
    <span class="label">km</span>
    <span class="num" id="distanceValue">0.000</span>
  </div>

  <div class="divider"></div>

  <div class="item">
    <span class="label">speed</span>
    <span class="num" id="speedValue">0.0</span>
    <span class="unit">km/h</span>
  </div>
</div>

<script>
  const distanceValueEl = document.getElementById('distanceValue');
  const speedValueEl = document.getElementById('speedValue');

  let totalMeters = 0;
  let lastPoint = null;
  let smoothSpeed = 0;
  let speedBuffer = [];
  let lastMoveTime = 0;

  const MAX_ACCURACY_M = 45;
  const MIN_DISTANCE_M = 1.5;
  const MAX_DISTANCE_M = 100;
  const MIN_SPEED_KMH = 1.0;
  const MAX_SPEED_KMH = 45;
  const SPEED_BUFFER_SIZE = 5;
  const STOP_TIMEOUT_MS = 3500;

  function toRad(v) {
    return v * Math.PI / 180;
  }

  function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function avg(arr) {
    if (!arr.length) return 0;
    return arr.reduce((sum, v) => sum + v, 0) / arr.length;
  }

  function getSmoothFactor(speedKmh) {
    if (speedKmh < 7) return 0.45;
    if (speedKmh < 18) return 0.35;
    return 0.25;
  }

  function updateUI() {
    distanceValueEl.textContent = (totalMeters / 1000).toFixed(3);
    speedValueEl.textContent = smoothSpeed.toFixed(1);
  }

  function applySpeed(rawKmh) {
    speedBuffer.push(rawKmh);
    if (speedBuffer.length > SPEED_BUFFER_SIZE) speedBuffer.shift();

    const averaged = avg(speedBuffer);
    const smoothFactor = getSmoothFactor(averaged);

    smoothSpeed = smoothSpeed + (averaged - smoothSpeed) * smoothFactor;

    if (smoothSpeed < 0.8) smoothSpeed = 0;
  }

  function decaySpeedIfStopped() {
    const now = Date.now();
    if (now - lastMoveTime > STOP_TIMEOUT_MS) {
      smoothSpeed *= 0.55;
      if (smoothSpeed < 0.8) smoothSpeed = 0;
      updateUI();
    }
  }

  function handlePosition(pos) {
    const { latitude, longitude, accuracy, speed } = pos.coords;
    const timestamp = pos.timestamp;

    if (!lastPoint) {
      lastPoint = { latitude, longitude, timestamp, accuracy };
      updateUI();
      return;
    }

    const dt = (timestamp - lastPoint.timestamp) / 1000;
    if (dt <= 0) return;

    const dist = distanceMeters(
      lastPoint.latitude,
      lastPoint.longitude,
      latitude,
      longitude
    );

    const nativeSpeedKmh = (speed != null && speed >= 0) ? speed * 3.6 : null;
    const calcSpeedKmh = (dist / dt) * 3.6;
    let finalSpeedKmh = nativeSpeedKmh;

    if (finalSpeedKmh == null || finalSpeedKmh <= 0 || finalSpeedKmh > 60) {
      finalSpeedKmh = calcSpeedKmh;
    }

    if (finalSpeedKmh >= MIN_SPEED_KMH && finalSpeedKmh <= MAX_SPEED_KMH) {
      applySpeed(finalSpeedKmh);
      lastMoveTime = Date.now();
    } else {
      if (smoothSpeed < 0.8) smoothSpeed = 0;
    }

    const accuracyOk = accuracy <= MAX_ACCURACY_M;
    const distanceOk = dist >= MIN_DISTANCE_M && dist <= MAX_DISTANCE_M;
    const movingOk = finalSpeedKmh >= MIN_SPEED_KMH && finalSpeedKmh <= MAX_SPEED_KMH;

    if (accuracyOk && distanceOk && movingOk) {
      totalMeters += dist;
    }

    lastPoint = { latitude, longitude, timestamp, accuracy };
    updateUI();
  }

  function handleError(err) {
    console.log('Geolocation error:', err);
  }

  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(handlePosition, handleError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    });

    setInterval(decaySpeedIfStopped, 1000);
  }

  updateUI();
</script>

</body>
</html>
