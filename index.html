<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#bar {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  align-items: center;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 20px;

  padding: 6px 14px;
  color: white;
  font-size: 14px;

  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.block {
  display: flex;
  align-items: center;
  gap: 6px;
}

.label {
  opacity: 0.7;
  font-size: 11px;
}

.value {
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="bar">
  <div class="block">
    <span class="label">KM</span>
    <span class="value" id="km">0.00</span>
  </div>

  <div class="block">
    <span class="label">SPEED</span>
    <span class="value" id="speed">0</span> km/h
  </div>
</div>

<script>
let totalDistance = 0;
let lastPos = null;

function toRad(x) {
  return x * Math.PI / 180;
}

function getDistance(p1, p2) {
  const R = 6371;
  const dLat = toRad(p2.latitude - p1.latitude);
  const dLon = toRad(p2.longitude - p1.longitude);

  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(toRad(p1.latitude)) * Math.cos(toRad(p2.latitude)) *
            Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

navigator.geolocation.watchPosition(pos => {
  const coords = pos.coords;

  // скорость (м/с → км/ч)
  if (coords.speed !== null) {
    let speedKmh = coords.speed * 3.6;
    document.getElementById("speed").innerText = speedKmh.toFixed(1);
  }

  // километраж
  if (lastPos) {
    const dist = getDistance(lastPos.coords, coords);
    if (dist > 0.001) { // фильтр от шума GPS
      totalDistance += dist;
      document.getElementById("km").innerText = totalDistance.toFixed(2);
    }
  }

  lastPos = pos;

}, err => console.log(err), {
  enableHighAccuracy: true,
  maximumAge: 1000
});
</script>

</body>
</html>
