<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRL Distance + Speed</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
    }

    #bar {
      position: fixed;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(10, 10, 14, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      color: white;
      white-space: nowrap;
    }

    .bolt-wrap {
      width: 20px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bolt {
      width: 18px;
      height: 22px;
      opacity: 0.7;
      transition: 0.2s;
    }

    .bolt path {
      stroke: url(#boltGradient);
      stroke-width: 2.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: flow 2.2s linear infinite;
    }

    .bolt.flash {
      transform: scale(1.2);
      filter:
        drop-shadow(0 0 10px #00e5ff)
        drop-shadow(0 0 18px #8a2eff)
        drop-shadow(0 0 25px #ff8a00);
    }

    @keyframes flow {
      0% { stroke-dashoffset: 120; }
      100% { stroke-dashoffset: 0; }
    }

    .item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      text-transform: lowercase;
    }

    .num {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      transition: 0.2s;
    }

    /* ОДИНАКОВЫЕ СТИЛИ ДЛЯ ОБОИХ ЧИСЕЛ */
    .glow-idle {
      color: #4fc3ff;
      text-shadow:
        0 0 4px #4fc3ff,
        0 0 10px #2196f3;
    }

    .glow-mid {
      color: #8a2eff;
      text-shadow:
        0 0 8px #8a2eff,
        0 0 18px #8a2eff,
        0 0 28px rgba(138,46,255,0.55);
    }

    .glow-fast {
      color: #ff8a00;
      text-shadow:
        0 0 10px #ff8a00,
        0 0 20px #ff3cac,
        0 0 32px rgba(255,138,0,0.65);
    }

    .glow-flash {
      transform: scale(1.13);
      text-shadow:
        0 0 15px #ffffff,
        0 0 24px #00e5ff,
        0 0 36px #ff3cac,
        0 0 48px #ff8a00;
    }

    .unit {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-weight: 700;
    }

    .divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="bar">
  <span class="bolt-wrap">
    <svg class="bolt" id="boltIcon" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="boltGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00e5ff"/>
          <stop offset="50%" stop-color="#8a2eff"/>
          <stop offset="100%" stop-color="#ff8a00"/>
        </linearGradient>
      </defs>
      <path d="M13 2 L6.5 15 H11 L8.5 28 L18 12.5 H13.5 L17 2 Z"></path>
    </svg>
  </span>

  <div class="item">
    <span class="label">km</span>
    <span class="num glow-idle" id="distanceValue">0.000</span>
  </div>

  <div class="divider"></div>

  <div class="item">
    <span class="label">speed</span>
    <span class="num glow-idle" id="speed">0.0</span>
    <span class="unit">km/h</span>
  </div>
</div>

<script>
  const speedEl = document.getElementById('speed');
  const distanceEl = document.getElementById('distanceValue');
  const bolt = document.getElementById('boltIcon');

  let lastSpeed = 0;
  let totalMeters = 0;
  let lastPos = null;
  let flashTimeout = null;

  function setGlowState(state) {
    const states = ['glow-idle', 'glow-mid', 'glow-fast'];
    distanceEl.classList.remove(...states);
    speedEl.classList.remove(...states);

    distanceEl.classList.add(state);
    speedEl.classList.add(state);
  }

  function triggerFlash() {
    distanceEl.classList.add('glow-flash');
    speedEl.classList.add('glow-flash');
    bolt.classList.add('flash');

    clearTimeout(flashTimeout);
    flashTimeout = setTimeout(() => {
      distanceEl.classList.remove('glow-flash');
      speedEl.classList.remove('glow-flash');
      bolt.classList.remove('flash');
    }, 220);
  }

  function updateSpeedVisual(speed) {
    if (speed >= 20) {
      setGlowState('glow-fast');
    } else if (speed >= 10) {
      setGlowState('glow-mid');
    } else {
      setGlowState('glow-idle');
    }

    const delta = speed - lastSpeed;

    if (delta > 1.5) {
      triggerFlash();
    }

    lastSpeed = speed;
  }

  function calcDistance(a, b) {
    const R = 6371000;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lon - a.lon) * Math.PI / 180;
    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;

    const x =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;

    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
  }

  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const accuracy = pos.coords.accuracy || 999;
    const rawSpeed = pos.coords.speed;
    const gpsSpeed = (rawSpeed != null && rawSpeed >= 0) ? rawSpeed * 3.6 : 0;

    let finalSpeed = gpsSpeed;

    if (lastPos) {
      const d = calcDistance(lastPos, { lat, lon });
      const dt = (Date.now() - lastPos.t) / 1000;

      if ((!finalSpeed || finalSpeed <= 0) && dt > 0) {
        finalSpeed = (d / dt) * 3.6;
      }

      const accuracyOk = accuracy <= 40;
      const distanceOk = d >= 1.5 && d <= 80;
      const movingOk = finalSpeed >= 1.0 && finalSpeed <= 45;

      if (accuracyOk && distanceOk && movingOk) {
        totalMeters += d;
      }
    }

    lastPos = { lat, lon, t: Date.now() };

    distanceEl.textContent = (totalMeters / 1000).toFixed(3);
    speedEl.textContent = finalSpeed.toFixed(1);

    updateSpeedVisual(finalSpeed);

  }, err => console.log(err), {
    enableHighAccuracy: true,
    maximumAge: 0
  });
</script>

</body>
</html>
