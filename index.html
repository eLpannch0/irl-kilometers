<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRL Distance + Speed</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
    }

    #bar {
      position: fixed;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(10, 10, 14, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      color: white;
      white-space: nowrap;
    }

    /* ⚡ НЕОНОВАЯ МОЛНИЯ */
    .bolt-wrap {
      width: 18px;
      height: 22px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bolt {
      width: 18px;
      height: 22px;
      display: block;
      filter:
        drop-shadow(0 0 2px rgba(255,255,255,0.25))
        drop-shadow(0 0 5px rgba(0,212,255,0.35))
        drop-shadow(0 0 10px rgba(183,0,255,0.35));
      transition: filter 0.25s ease, transform 0.25s ease, opacity 0.25s ease;
      opacity: 0.75;
    }

    .bolt path {
      stroke: url(#boltGradient);
      stroke-width: 2.6;
      fill: none;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-dasharray: 120;
      stroke-dashoffset: 0;
      animation: boltFlow 2.2s linear infinite;
    }

    /* спокойный режим */
    .bolt.idle {
      filter:
        drop-shadow(0 0 2px rgba(255,255,255,0.20))
        drop-shadow(0 0 4px rgba(79,195,255,0.25));
      opacity: 0.55;
      transform: scale(0.96);
    }

    /* активный режим при ходьбе/езде */
    .bolt.active {
      filter:
        drop-shadow(0 0 3px rgba(255,255,255,0.30))
        drop-shadow(0 0 8px rgba(0,212,255,0.65))
        drop-shadow(0 0 14px rgba(125,92,255,0.55))
        drop-shadow(0 0 18px rgba(255,111,0,0.45));
      opacity: 1;
      transform: scale(1.04);
    }

    @keyframes boltFlow {
      0%   { stroke-dashoffset: 120; }
      100% { stroke-dashoffset: 0; }
    }

    .item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      min-width: 18px;
    }

    .num {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      color: #4fc3ff;
      text-shadow:
        0 0 2px #4fc3ff,
        0 0 6px #4fc3ff,
        0 0 12px #2196f3,
        0 0 20px #2196f3,
        0 0 30px rgba(33,150,243,0.7);
      animation: neonPulse 2s infinite;
    }

    @keyframes neonPulse {
      0% { text-shadow: 0 0 4px #4fc3ff, 0 0 10px #2196f3; }
      50% { text-shadow: 0 0 10px #4fc3ff, 0 0 25px #2196f3; }
      100% { text-shadow: 0 0 4px #4fc3ff, 0 0 10px #2196f3; }
    }

    .unit {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }

    .divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="bar">
  <span class="bolt-wrap">
    <svg class="bolt idle" id="boltIcon" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="boltGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#00e5ff">
            <animate attributeName="stop-color"
              values="#00e5ff;#4fc3ff;#8a2eff;#ff3cac;#ff8a00;#00e5ff"
              dur="2.4s" repeatCount="indefinite" />
          </stop>
          <stop offset="45%" stop-color="#8a2eff">
            <animate attributeName="stop-color"
              values="#8a2eff;#ff3cac;#ff8a00;#00e5ff;#8a2eff"
              dur="2.4s" repeatCount="indefinite" />
          </stop>
          <stop offset="100%" stop-color="#ff8a00">
            <animate attributeName="stop-color"
              values="#ff8a00;#ff3cac;#8a2eff;#00e5ff;#ff8a00"
              dur="2.4s" repeatCount="indefinite" />
          </stop>
        </linearGradient>
      </defs>

      <!-- форма молнии -->
      <path d="M13 2 L6.5 15 H11 L8.5 28 L18 12.5 H13.5 L17 2 Z"></path>
    </svg>
  </span>

  <div class="item">
    <span class="label">km</span>
    <span class="num" id="distanceValue">0.000</span>
  </div>

  <div class="divider"></div>

  <div class="item">
    <span class="label">speed</span>
    <span class="num" id="speed">0.0</span>
    <span class="unit">km/h</span>
  </div>
</div>

<script>
  const distanceValueEl = document.getElementById('distanceValue');
  const speedEl = document.getElementById('speed');
  const boltIcon = document.getElementById('boltIcon');

  let totalMeters = 0;
  let lastPoint = null;
  let speedSamples = [];
  let smoothSpeed = 0;
  let lastMoveTime = 0;

  const MAX_ACCURACY_M = 40;
  const MIN_DISTANCE_M = 1.5;
  const MAX_DISTANCE_M = 80;
  const MIN_MOVE_SPEED_KMH = 1.0;
  const MAX_REAL_SPEED_KMH = 45;
  const SAMPLE_WINDOW = 5;
  const STOP_TIMEOUT_MS = 3500;

  function toRad(v) {
    return v * Math.PI / 180;
  }

  function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) ** 2;

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function avg(arr) {
    if (!arr.length) return 0;
    return arr.reduce((s, v) => s + v, 0) / arr.length;
  }

  function getAdaptiveSettings(speedKmh) {
    if (speedKmh < 7) return { minSpeed: 1.0, smooth: 0.45 };
    if (speedKmh < 18) return { minSpeed: 2.0, smooth: 0.35 };
    return { minSpeed: 5.0, smooth: 0.25 };
  }

  function updateBoltState() {
    if (smoothSpeed >= 1.0) {
      boltIcon.classList.remove('idle');
      boltIcon.classList.add('active');
    } else {
      boltIcon.classList.remove('active');
      boltIcon.classList.add('idle');
    }
  }

  function updateUI() {
    distanceValueEl.textContent = (totalMeters / 1000).toFixed(3);
    speedEl.textContent = smoothSpeed.toFixed(1);
    updateBoltState();
  }

  function applySpeed(rawKmh, smoothFactor) {
    speedSamples.push(rawKmh);
    if (speedSamples.length > SAMPLE_WINDOW) speedSamples.shift();

    const averaged = avg(speedSamples);
    smoothSpeed += (averaged - smoothSpeed) * smoothFactor;

    if (smoothSpeed < 0.8) smoothSpeed = 0;
  }

  function decaySpeedIfStopped() {
    const now = Date.now();
    if (now - lastMoveTime > STOP_TIMEOUT_MS) {
      smoothSpeed *= 0.55;
      if (smoothSpeed < 0.8) smoothSpeed = 0;
      updateUI();
    }
  }

  function handlePosition(pos) {
    const { latitude, longitude, accuracy, speed } = pos.coords;
    const timestamp = pos.timestamp;

    if (!lastPoint) {
      lastPoint = { latitude, longitude, timestamp, accuracy };
      updateUI();
      return;
    }

    const dt = (timestamp - lastPoint.timestamp) / 1000;
    if (dt <= 0) return;

    const dist = distanceMeters(
      lastPoint.latitude,
      lastPoint.longitude,
      latitude,
      longitude
    );

    const nativeSpeed = (speed != null && speed >= 0) ? speed * 3.6 : null;
    const calcSpeed = (dist / dt) * 3.6;

    let finalSpeed = nativeSpeed;
    if (!finalSpeed || finalSpeed <= 0 || finalSpeed > 60) {
      finalSpeed = calcSpeed;
    }

    const adaptive = getAdaptiveSettings(finalSpeed);

    if (finalSpeed >= adaptive.minSpeed && finalSpeed <= MAX_REAL_SPEED_KMH) {
      applySpeed(finalSpeed, adaptive.smooth);
      lastMoveTime = Date.now();
    } else {
      if (smoothSpeed < 0.8) smoothSpeed = 0;
    }

    const accuracyOk = accuracy <= MAX_ACCURACY_M;
    const distanceOk = dist >= MIN_DISTANCE_M && dist <= MAX_DISTANCE_M;
    const movingOk = finalSpeed >= MIN_MOVE_SPEED_KMH && finalSpeed <= MAX_REAL_SPEED_KMH;

    if (accuracyOk && distanceOk && movingOk) {
      totalMeters += dist;
    }

    lastPoint = { latitude, longitude, timestamp, accuracy };
    updateUI();
  }

  function handleError(err) {
    console.log('Geolocation error:', err);
  }

  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(handlePosition, handleError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 15000
    });

    setInterval(decaySpeedIfStopped, 1000);
  }

  updateUI();
</script>

</body>
</html>
