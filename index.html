<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.hud {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 30px;
  padding: 16px 28px;
  border-radius: 25px;
  background: rgba(30,30,30,0.55);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.lightning {
  font-size: 26px;
}

.block {
  display: flex;
  align-items: center;
  gap: 6px;
}

.value {
  font-size: 36px;
  font-weight: 900;
  color: #00d9ff;
  text-shadow: 0 0 12px rgba(0,217,255,0.7);
}

.label {
  font-size: 16px;
  color: #aaa;
}

.divider {
  width: 2px;
  height: 30px;
  background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="hud">
  <div class="lightning">⚡</div>

  <div class="block">
    <div class="value" id="km">0.000</div>
    <div class="label">km</div>
  </div>

  <div class="divider"></div>

  <div class="block">
    <div class="value" id="speed">0.0</div>
    <div class="label">km/h</div>
  </div>
</div>

<script>
let lastLat = null;
let lastLon = null;
let lastTime = null;
let totalMeters = 0;

function distance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI/180;

  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);

  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

navigator.geolocation.watchPosition(pos => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const time = pos.timestamp;

  let speed = 0;

  if (lastLat !== null) {
    const d = distance(lastLat, lastLon, lat, lon);
    const dt = (time - lastTime)/1000;

    if (dt > 0 && d < 100) {
      if (d > 1) totalMeters += d;
      speed = (d/dt)*3.6;
    }
  }

  if (pos.coords.speed != null) {
    speed = pos.coords.speed * 3.6;
  }

  if (speed < 1) speed = 0;

  document.getElementById("km").innerText = (totalMeters/1000).toFixed(3);
  document.getElementById("speed").innerText = speed.toFixed(1);

  lastLat = lat;
  lastLon = lon;
  lastTime = time;

}, err => {
  console.log("GPS error", err);
}, {
  enableHighAccuracy: true
});
</script>

</body>
</html>
