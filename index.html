<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRL Distance + Speed</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
    }

    #bar {
      position: fixed;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(10, 10, 14, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      color: white;
      white-space: nowrap;
    }

    /* ⚡ МОЛНИЯ */
    .bolt-wrap {
      width: 20px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bolt {
      width: 18px;
      height: 22px;
      opacity: 0.7;
      transition: 0.2s;
    }

    .bolt path {
      stroke: url(#boltGradient);
      stroke-width: 2.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: flow 2.2s linear infinite;
    }

    .bolt.flash {
      transform: scale(1.2);
      filter:
        drop-shadow(0 0 10px #00e5ff)
        drop-shadow(0 0 18px #8a2eff)
        drop-shadow(0 0 25px #ff8a00);
    }

    @keyframes flow {
      0% { stroke-dashoffset: 120; }
      100% { stroke-dashoffset: 0; }
    }

    .item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
    }

    /* 🔵 SPEED */
    .num {
      font-size: 26px;
      font-weight: 900;
      color: #4fc3ff;
      transition: 0.2s;
    }

    .speed-idle {
      color: #4fc3ff;
      text-shadow: 0 0 6px #4fc3ff;
    }

    .speed-mid {
      color: #8a2eff;
      text-shadow: 0 0 10px #8a2eff, 0 0 20px #8a2eff;
    }

    .speed-fast {
      color: #ff8a00;
      text-shadow: 0 0 12px #ff8a00, 0 0 25px #ff3cac;
    }

    .speed-flash {
      transform: scale(1.15);
      text-shadow:
        0 0 15px #fff,
        0 0 25px #00e5ff,
        0 0 35px #ff3cac,
        0 0 45px #ff8a00;
    }

    .unit {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }

    .divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="bar">
  <span class="bolt-wrap">
    <svg class="bolt" id="boltIcon" viewBox="0 0 24 30">
      <defs>
        <linearGradient id="boltGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00e5ff"/>
          <stop offset="50%" stop-color="#8a2eff"/>
          <stop offset="100%" stop-color="#ff8a00"/>
        </linearGradient>
      </defs>
      <path d="M13 2 L6.5 15 H11 L8.5 28 L18 12.5 H13.5 L17 2 Z"></path>
    </svg>
  </span>

  <div class="item">
    <span class="label">km</span>
    <span class="num" id="distanceValue">0.000</span>
  </div>

  <div class="divider"></div>

  <div class="item">
    <span class="label">speed</span>
    <span class="num speed-idle" id="speed">0.0</span>
    <span class="unit">km/h</span>
  </div>
</div>

<script>
  const speedEl = document.getElementById('speed');
  const distanceEl = document.getElementById('distanceValue');
  const bolt = document.getElementById('boltIcon');

  let lastSpeed = 0;
  let totalMeters = 0;
  let lastPos = null;

  function updateSpeedVisual(speed) {
    speedEl.classList.remove('speed-idle','speed-mid','speed-fast');

    if (speed >= 20) {
      speedEl.classList.add('speed-fast');
    } else if (speed >= 10) {
      speedEl.classList.add('speed-mid');
    } else {
      speedEl.classList.add('speed-idle');
    }

    const delta = speed - lastSpeed;

    if (delta > 1.5) {
      speedEl.classList.add('speed-flash');
      bolt.classList.add('flash');

      setTimeout(() => {
        speedEl.classList.remove('speed-flash');
        bolt.classList.remove('flash');
      }, 200);
    }

    lastSpeed = speed;
  }

  function calcDistance(a,b){
    const R=6371000;
    const dLat=(b.lat-a.lat)*Math.PI/180;
    const dLon=(b.lon-a.lon)*Math.PI/180;
    const lat1=a.lat*Math.PI/180;
    const lat2=b.lat*Math.PI/180;

    const x = Math.sin(dLat/2)**2 +
              Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;

    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  }

  navigator.geolocation.watchPosition(pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const speed = (pos.coords.speed || 0) * 3.6;

    if (lastPos) {
      const d = calcDistance(lastPos, {lat,lon});
      if (d > 1.5) totalMeters += d;
    }

    lastPos = {lat,lon};

    distanceEl.textContent = (totalMeters/1000).toFixed(3);
    speedEl.textContent = speed.toFixed(1);

    updateSpeedVisual(speed);

  }, err=>console.log(err), {
    enableHighAccuracy:true,
    maximumAge:0
  });
</script>

</body>
</html>
