<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRL Distance + Speed</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
    }

    #bar {
      position: fixed;
      left: 50%;
      bottom: 2px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(10, 10, 14, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      color: white;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4fc3ff;
      box-shadow: 0 0 12px #4fc3ff;
      flex: 0 0 auto;
    }

    .item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      min-width: 18px;
    }

    .num {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      color: #4fc3ff;
      text-shadow:
        0 0 2px #4fc3ff,
        0 0 6px #4fc3ff,
        0 0 12px #2196f3,
        0 0 20px #2196f3,
        0 0 30px rgba(33,150,243,0.7);
      animation: neonPulse 2s infinite;
    }

    @keyframes neonPulse {
      0% { text-shadow: 0 0 4px #4fc3ff, 0 0 10px #2196f3; }
      50% { text-shadow: 0 0 10px #4fc3ff, 0 0 25px #2196f3; }
      100% { text-shadow: 0 0 4px #4fc3ff, 0 0 10px #2196f3; }
    }

    .unit {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }

    .divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

<div id="bar">
  <span class="dot"></span>

  <div class="item">
    <span class="label" id="distanceLabel">m</span>
    <span class="num" id="distanceValue">0</span>
  </div>

  <div class="divider"></div>

  <div class="item">
    <span class="label">speed</span>
    <span class="num" id="speed">0.0</span>
    <span class="unit">km/h</span>
  </div>
</div>

<script>
  const distanceValueEl = document.getElementById('distanceValue');
  const distanceLabelEl = document.getElementById('distanceLabel');
  const speedEl = document.getElementById('speed');

  let totalMeters = 0;
  let lastPoint = null;
  let speedSamples = [];
  let smoothSpeed = 0;
  let lastMoveTime = 0;

  const MAX_ACCURACY_M = 40;
  const MIN_DISTANCE_M = 1.5;
  const MAX_DISTANCE_M = 80;
  const MIN_MOVE_SPEED_KMH = 1.0;
  const MAX_REAL_SPEED_KMH = 45;
  const SAMPLE_WINDOW = 5;
  const STOP_TIMEOUT_MS = 3500;

  function toRad(v) {
    return v * Math.PI / 180;
  }

  function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) ** 2;

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function avg(arr) {
    if (!arr.length) return 0;
    return arr.reduce((s, v) => s + v, 0) / arr.length;
  }

  function getAdaptiveSettings(speedKmh) {
    if (speedKmh < 7) {
      return { minSpeed: 1.0, smooth: 0.45 };
    }
    if (speedKmh < 18) {
      return { minSpeed: 2.0, smooth: 0.35 };
    }
    return { minSpeed: 5.0, smooth: 0.25 };
  }

  function updateUI() {
    if (totalMeters < 1000) {
      distanceValueEl.textContent = Math.round(totalMeters);
      distanceLabelEl.textContent = 'm';
    } else {
      distanceValueEl.textContent = (totalMeters / 1000).toFixed(2);
      distanceLabelEl.textContent = 'km';
    }

    speedEl.textContent = smoothSpeed.toFixed(1);
  }

  function applySpeed(rawKmh, smoothFactor) {
    speedSamples.push(rawKmh);
    if (speedSamples.length > SAMPLE_WINDOW) speedSamples.shift();

    const averaged = avg(speedSamples);
    smoothSpeed += (averaged - smoothSpeed) * smoothFactor;

    if (smoothSpeed < 0.8) smoothSpeed = 0;
  }

  function decaySpeedIfStopped() {
